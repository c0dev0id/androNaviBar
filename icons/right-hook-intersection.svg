<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" style="background:#f5f5f0; font-family: sans-serif;">

  <!-- Road: vertical (main road, going up/down) -->
  <rect x="260" y="0" width="80" height="600" fill="#ccc"/>
  <!-- Road: horizontal (crossing road) -->
  <rect x="0" y="260" width="600" height="80" fill="#ccc"/>

  <!-- Intersection box -->
  <rect x="260" y="260" width="80" height="80" fill="#bbb"/>

  <!-- Road markings: vertical center dashes -->
  <line x1="300" y1="0" x2="300" y2="250" stroke="white" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="300" y1="350" x2="300" y2="600" stroke="white" stroke-width="3" stroke-dasharray="20,15"/>
  <!-- Road markings: horizontal center dashes -->
  <line x1="0" y1="300" x2="250" y2="300" stroke="white" stroke-width="3" stroke-dasharray="20,15"/>
  <line x1="350" y1="300" x2="600" y2="300" stroke="white" stroke-width="3" stroke-dasharray="20,15"/>

  <!-- Bike lane indicator (left side of vertical road) -->
  <rect x="260" y="0" width="18" height="600" fill="#a8d8a8" opacity="0.6"/>
  <rect x="260" y="350" width="18" height="250" fill="#a8d8a8" opacity="0.6"/>

  <!-- === CAR === coming from the right, turning upward (right turn) -->
  <!-- Car body: positioned on horizontal road, coming from right, nose pointing into turn -->
  <!-- Car is at the intersection turning right (upward) -->
  <g transform="translate(390, 285)">
    <!-- car body -->
    <rect x="-15" y="-20" width="60" height="30" rx="5" fill="#e05a2b" stroke="#333" stroke-width="2"/>
    <!-- windshield -->
    <rect x="20" y="-16" width="18" height="22" rx="2" fill="#aaddff" opacity="0.7"/>
    <!-- wheels -->
    <circle cx="-5" cy="-22" r="6" fill="#333"/>
    <circle cx="40" cy="-22" r="6" fill="#333"/>
    <circle cx="-5" cy="12" r="6" fill="#333"/>
    <circle cx="40" cy="12" r="6" fill="#333"/>
    <!-- driver head (turned right = looking away from cyclist) -->
    <circle cx="30" cy="-8" r="7" fill="#f5c89a" stroke="#888" stroke-width="1"/>
    <!-- eyes looking RIGHT (away from cyclist who is to the left/bottom) -->
    <circle cx="33" cy="-8" r="2" fill="#333"/>
    <!-- label -->
    <text x="-10" y="28" font-size="12" fill="#c0392b" font-weight="bold">CAR</text>
    <text x="-15" y="42" font-size="10" fill="#c0392b">(driver looking right)</text>
  </g>

  <!-- Car movement arrow: from right, curving up (right turn) -->
  <path d="M 560,300 Q 430,300 310,250" fill="none" stroke="#e05a2b" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrowOrange)"/>

  <!-- === CYCLIST === coming from bottom, going straight up -->
  <g transform="translate(278, 420)">
    <!-- bike frame -->
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#2255cc" stroke-width="3"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#2255cc" stroke-width="3"/>
    <line x1="30" y1="-20" x2="30" y2="0" stroke="#2255cc" stroke-width="2"/>
    <!-- wheels -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#2255cc" stroke-width="3"/>
    <circle cx="30" cy="0" r="12" fill="none" stroke="#2255cc" stroke-width="3"/>
    <!-- rider body -->
    <line x1="15" y1="-20" x2="15" y2="-50" stroke="#2255cc" stroke-width="4"/>
    <!-- head -->
    <circle cx="15" cy="-58" r="10" fill="#2255cc"/>
    <!-- handlebar arms -->
    <line x1="15" y1="-40" x2="28" y2="-30" stroke="#2255cc" stroke-width="3"/>
    <!-- label -->
    <text x="-20" y="30" font-size="12" fill="#2255cc" font-weight="bold">CYCLIST</text>
    <text x="-20" y="44" font-size="10" fill="#2255cc">(going straight)</text>
  </g>

  <!-- Cyclist movement arrow: straight up -->
  <path d="M 278,520 L 278,380" fill="none" stroke="#2255cc" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrowBlue)"/>

  <!-- DANGER ZONE / near miss marker -->
  <circle cx="295" cy="310" r="28" fill="none" stroke="#ff0000" stroke-width="4" stroke-dasharray="6,4" opacity="0.85"/>
  <text x="330" y="295" font-size="13" fill="#cc0000" font-weight="bold">⚠ NEAR MISS</text>

  <!-- Compass / viewer direction -->
  <text x="10" y="590" font-size="12" fill="#555">👁 Camera / viewer direction: from bottom ↑</text>

  <!-- Cardinal labels -->
  <text x="285" y="25" font-size="13" fill="#444" font-weight="bold">↑ AWAY</text>
  <text x="285" y="585" font-size="13" fill="#444" font-weight="bold">↓ VIEWER</text>
  <text x="520" y="295" font-size="13" fill="#c0392b" font-weight="bold">CAR →</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2255cc"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05a2b"/>
    </marker>
  </defs>

</svg>
